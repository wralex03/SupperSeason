# ================= { FISH FORMAT } =================
# <id>:
#   display: <name>                               # fish's display name, use & as color code
#   season: <season>                             # included: spring, summer, autumn, winter or none for all season
#   rarity: <rarity>                                  # see in rarity.yml
#   length:                                              # fish's length options (cm)
#     min: <amount>                               # smallest fish can be found
#     max: <amount>                              # biggest fish can be found
#     enable: <true/false>                        # will caught item display length
#   icon:                                                # icon options:
#     id: <material>                                 # can be found in spigot wiki, choose suitable material each version
#     data: <value>                                 # custom model data (only work for 1.14+)
#     description:                                   # same as lore
#     - <desc 1>
#     ....
#   trigger:                                             # mechanic on interact with fish
#     caught:                                           # run commands on caught
#     - <command 1>
#     ....
#     eat:                                                 # run commands on eat
#     - <command 2>
#     ....
# ===================================================
# icon-id can be COD, SALMON, PUFFERFISH, TROPICAL_FISH (SHELL for 1.13+).
#
# always have a ' ' in end of trigger line
# there was some special key can use
# %p - Player who eat, caught
# %rp - Random a online player 
# %ird# - Random a integer number from 1 - #
# %drd# - Random a real number from 1 - #
#

